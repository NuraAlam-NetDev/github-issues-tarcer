<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />

    <!-- Google font -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Font awesome -->

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- DaisyUI & Tailwind  -->

    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4">

    </script>
    <link rel="stylesheet" href="style.css">
  </head>
   <body class="min-h-screen max-w-md  mx-auto">
<div class="login flex flex-col items-center">
    <div class="logo flex flex-col items-center gap-3 pt-10 ">
        <img src="/assets/github-logo.png" alt="" srcset="">
        <h1 class="font-semibold text-lg">GitHub Issues Tracker</h1>
        <h3 class="text-[#64748B]">Sign in to manage your issues</h3>

    </div>

    <div class="card  w-full max-w-sm shrink-0 shadow-2xl">
      <div class="card-body">
            <fieldset class="fieldset">
            <label class="label font-medium text-lg text-[#1F2937]">Username</label>
            <input id="input-username" type="text" class="input" placeholder="Enter Username" />
            <label class="label font-medium text-[#1F2937]">Password</label>
            <input id="input-password" type="password" class="input " placeholder="Password" />
            
            <button  id="login-btn" class="btn btn-primary mt-4">Sign in</button>
            </fieldset>
        </div>
       

  

    
    
    

    <script src="script/login.js"></script>
  </body>
</html>
